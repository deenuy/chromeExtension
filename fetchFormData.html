<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Image</title>
  </head>

  <body>
    <h2 style="display: flex; justify-content: center">BugZilla</h2>
    <div style="width: 300px">
      <div style="display: flex">
        <ul>
          <li><b>Summary</b> : <span id="summary"></span></li>
          <li><b>Product</b> : <span id="product_label"></span></li>
          <li><b>Description</b> : <span id="description"></span></li>
          <li><b>Version</b> : <span id="version_select"></span></li>
          <li><b>Bug Type</b> : <span id="bug_type"></span></li>
          <li><b>Attachment</b> : <span id="attachment"></span></li>
          <li><b>Hardware</b> : <span id="hardware"></span></li>
          <li><b>OS</b> : <span id="os"></span></li>
        </ul>
        <br>
      </div>
      <button id="capture_image">Capture Image</button>
      <button id="getAllTabs">GetAllTab</button>
      <!-- <button id="test">Fetch</button> -->
    </div>
    <script src="fetchFormData.js"></script>
    <script src="capture_imgs.js"></script>
    <script src="scripts/getAllTabs.js"></script>
  </body>

</html>
