<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <title>Capture Image</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="./assets/fetchFormData.css">
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="./assets/icon-32.png" alt="Logo">
        <h3 class="h">Bugzilla Image Clipper RecSys</h3>
      </div>
    </header>
    <div style="width: 300px">
      <div style="display: flex">
        <ul>
          <li><b>Summary</b> : <span id="summary"></span></li>
          <li><b>Product</b> : <span id="product_label"></span></li>
          <li><b>Component</b> : <span id="component_label"></span></li>
          <li><b>Description</b> : <span id="description"></span></li>
          <li><b>Version</b> : <span id="version_select"></span></li>
          <li><b>Bug Type</b> : <span id="bug_type"></span></li>
          <li><b>Attachment</b> : <span id="attachment"></span></li>
          <li><b>Hardware</b> : <span id="hardware"></span></li>
          <li><b>OS</b> : <span id="os"></span></li>
        </ul>
        <br>
      </div>
      <button type="button" class="btn btn-warning" id="capture_image">Capture Image</button>
      <button type="button" class="btn btn-warning" id="getAllTabs">GetAllTab</button>
      <button type="button" class="btn btn-warning" id="getAllWindows">GetAllWindows</button>
      <!-- <button id="test">Fetch</button> -->
    </div>
    <script src="fetchFormData.js"></script>
    <script src="capture_imgs.js"></script>
    <script src="scripts/getAllTabs.js"></script>
  </body>

</html>
